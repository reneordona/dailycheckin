<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Check-In Reminder — HACLB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&family=Noto+Sans+Khmer:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #05c3de;
    --red: #de3c31;
    --gold: #f79f1b;
    --navy: #003865;
    --navy-deep: #001f3a;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--navy-deep);
    font-family: 'Mona Sans', sans-serif;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    color: var(--white);
  }

  /* ---------- ANIMATED GRADIENT WAVES BACKGROUND ---------- */
  .wave-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(5, 195, 222, 0.55) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(247, 159, 27, 0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 20%, rgba(222, 60, 49, 0.25) 0%, transparent 50%),
      linear-gradient(135deg, #001f3a 0%, #003865 50%, #002347 100%);
    background-size: 200% 200%, 200% 200%, 200% 200%, 100% 100%;
    animation: waveDrift 22s ease-in-out infinite;
  }

  .wave-bg::before,
  .wave-bg::after {
    content: '';
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(ellipse at 30% 60%, rgba(5, 195, 222, 0.18) 0%, transparent 40%),
      radial-gradient(ellipse at 70% 40%, rgba(247, 159, 27, 0.14) 0%, transparent 40%);
    background-size: 150% 150%;
    animation: waveDrift2 28s ease-in-out infinite reverse;
    mix-blend-mode: screen;
  }

  .wave-bg::after {
    background:
      radial-gradient(ellipse at 50% 50%, rgba(222, 60, 49, 0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 10% 80%, rgba(5, 195, 222, 0.15) 0%, transparent 50%);
    background-size: 180% 180%;
    animation: waveDrift3 35s ease-in-out infinite;
  }

  @keyframes waveDrift {
    0%, 100% { background-position: 0% 0%, 100% 100%, 50% 0%, 0 0; }
    25%      { background-position: 100% 50%, 0% 50%, 0% 100%, 0 0; }
    50%      { background-position: 50% 100%, 50% 0%, 100% 50%, 0 0; }
    75%      { background-position: 0% 50%, 100% 0%, 50% 100%, 0 0; }
  }

  @keyframes waveDrift2 {
    0%, 100% { background-position: 0% 50%; transform: rotate(0deg); }
    50%      { background-position: 100% 50%; transform: rotate(2deg); }
  }

  @keyframes waveDrift3 {
    0%, 100% { background-position: 50% 0%; }
    50%      { background-position: 50% 100%; }
  }

  /* Subtle grain for richness */
  .grain {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    opacity: 0.6;
    z-index: 1;
  }

  /* ---------- LAYOUT ---------- */
  .content {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 130vmin;
    height: 100%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto auto;
    justify-content: center;
    align-items: center;
    column-gap: 6vmin;
    padding: 4vmin 6vmin;
  }

  /* ---------- LEFT: HEADLINE ---------- */
  .left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2.2vmin;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 1.2vmin;
    width: fit-content;
    padding: 1vmin 2vmin;
    background: rgba(5, 195, 222, 0.15);
    border: 1px solid rgba(5, 195, 222, 0.45);
    border-radius: 100px;
    font-size: 1.8vmin;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    backdrop-filter: blur(8px);
  }

  .eyebrow .pulse {
    width: 1.2vmin;
    height: 1.2vmin;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(5, 195, 222, 0.7);
    animation: pulseDot 2s infinite;
  }

  @keyframes pulseDot {
    0%   { box-shadow: 0 0 0 0 rgba(5, 195, 222, 0.7); }
    70%  { box-shadow: 0 0 0 1.5vmin rgba(5, 195, 222, 0); }
    100% { box-shadow: 0 0 0 0 rgba(5, 195, 222, 0); }
  }

  h1 {
    font-family: 'Mona Sans', sans-serif;
    font-weight: 800;
    font-size: 13vmin;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: var(--white);
  }

  h1 .highlight {
    background: linear-gradient(90deg, var(--cyan) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-style: italic;
  }

  .subhead {
    font-size: 2.6vmin;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.85);
    max-width: 90%;
  }

  .subhead strong {
    color: var(--gold);
    font-weight: 700;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 1.5vmin;
    margin-top: 1vmin;
    padding: 2vmin 3vmin;
    background: var(--white);
    color: var(--navy);
    border-radius: 1.2vmin;
    font-weight: 700;
    font-size: 2.4vmin;
    width: fit-content;
    box-shadow: 0 1vmin 3vmin rgba(0, 0, 0, 0.25);
  }

  .cta .arrow {
    display: inline-block;
    font-size: 2.6vmin;
    animation: nudge 1.8s ease-in-out infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(0.6vmin); }
  }

  /* ---------- RIGHT: TIME CARD ---------- */
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 52vmin;
    padding: 5vmin 4vmin;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 3vmin;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 2vmin 6vmin rgba(0, 0, 0, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.15);
    text-align: center;
  }

  .card-label {
    font-size: 1.7vmin;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.65);
    margin-bottom: 2vmin;
  }

  .clock-icon {
    width: 12vmin;
    height: 12vmin;
    margin: 0 auto 2vmin;
    display: block;
  }

  .clock-face {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 4;
  }

  .clock-hand-hour {
    stroke: var(--white);
    stroke-width: 5;
    stroke-linecap: round;
    transform-origin: 50px 50px;
    animation: rotateHour 60s linear infinite;
  }

  .clock-hand-minute {
    stroke: var(--gold);
    stroke-width: 3.5;
    stroke-linecap: round;
    transform-origin: 50px 50px;
    animation: rotateMinute 5s linear infinite;
  }

  .clock-center {
    fill: var(--white);
  }

  @keyframes rotateHour {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes rotateMinute {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .window {
    font-family: 'Mona Sans', sans-serif;
    font-weight: 800;
    font-size: 6vmin;
    line-height: 1;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 1vmin;
  }

  .window-detail {
    font-size: 2vmin;
    color: rgba(255, 255, 255, 0.75);
    font-weight: 400;
    line-height: 1.4;
  }

  .divider {
    width: 60%;
    height: 1px;
    margin: 3vmin auto;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }

  .applies-to {
    display: flex;
    flex-direction: column;
    gap: 1.2vmin;
    align-items: flex-start;
    text-align: left;
    padding: 0 2vmin;
  }

  .applies-row {
    display: flex;
    align-items: center;
    gap: 1.5vmin;
    font-size: 1.9vmin;
    color: rgba(255, 255, 255, 0.9);
  }

  .check {
    flex-shrink: 0;
    width: 2.4vmin;
    height: 2.4vmin;
    background: var(--cyan);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--navy);
    font-size: 1.4vmin;
    font-weight: 900;
  }

  /* ---------- FOOTER BRAND BAR ---------- */
  .brand-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1.2vmin;
    background: linear-gradient(90deg,
      var(--cyan) 0%,
      var(--cyan) 25%,
      var(--gold) 25%,
      var(--gold) 50%,
      var(--red) 50%,
      var(--red) 75%,
      var(--navy) 75%,
      var(--navy) 100%);
    z-index: 6;
  }

  .footer-text {
    position: absolute;
    bottom: 3vmin;
    left: 6vmin;
    right: 6vmin;
    z-index: 6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.6vmin;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  /* Decorative floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(2vmin);
    opacity: 0.5;
    z-index: 2;
  }

  .orb-1 {
    width: 18vmin; height: 18vmin;
    background: var(--cyan);
    top: 8%; left: 38%;
    animation: float1 14s ease-in-out infinite;
  }

  .orb-2 {
    width: 12vmin; height: 12vmin;
    background: var(--gold);
    bottom: 18%; left: 52%;
    animation: float2 18s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(4vmin, -3vmin); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(-3vmin, 2vmin); }
  }

  /* Entrance animation */
  .left > *, .right > * {
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .eyebrow      { animation-delay: 0.15s; }
  h1            { animation-delay: 0.30s; }
  .subhead      { animation-delay: 0.50s; }
  .cta          { animation-delay: 0.70s; }
  .right .card  { animation-delay: 0.40s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(2vmin); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="wave-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grain"></div>

    <div class="content">
      <!-- LEFT -->
      <div class="left">
        <div class="eyebrow">
          <span class="pulse"></span>
          Daily Reminder
        </div>

        <h1>Don't forget your<br><span class="highlight">daily check-in.</span></h1>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="card">
          <div class="card-label">Window to Check In</div>

          <svg class="clock-icon" viewBox="0 0 100 100">
            <circle class="clock-face" cx="50" cy="50" r="44"/>
            <line class="clock-hand-hour"   x1="50" y1="50" x2="50" y2="28"/>
            <line class="clock-hand-minute" x1="50" y1="50" x2="50" y2="20"/>
            <circle class="clock-center" cx="50" cy="50" r="3.5"/>
            <circle cx="50" cy="10" r="1.8" fill="rgba(255,255,255,0.6)"/>
            <circle cx="90" cy="50" r="1.8" fill="rgba(255,255,255,0.6)"/>
            <circle cx="50" cy="90" r="1.8" fill="rgba(255,255,255,0.6)"/>
            <circle cx="10" cy="50" r="1.8" fill="rgba(255,255,255,0.6)"/>
          </svg>

          <div class="window">First 15 Minutes</div>
          <div class="window-detail">of your scheduled work day</div>
        </div>
      </div>
    </div>

    <div class="footer-text">
      <span>Housing Authority of the City of Long Beach</span>
      <span>Daily Staff Check-In</span>
    </div>
    <div class="brand-bar"></div>
  </div>
</body>
</html>
